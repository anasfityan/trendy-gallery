<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>حقائبي السحابية</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f2ed;--card:#fff;--deep:#1a1410;--gold:#c8962e;--gold-l:#f0c96a;
  --text:#2a1f14;--text2:#8a7060;--border:#e0d8ce;--green:#2d7a4f;--red:#b53a2f;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);min-height:100vh;}

/* التنسيقات العامة للواجهة */
.hdr{background:var(--deep);padding:16px;position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px; color:#fff;}
.hcount{background:rgba(255,255,255,.1);border-radius:20px;padding:5px 14px;color:var(--gold-l);font-size:14px;}
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 10px 100px;}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);}
.card-thumb{width:100%;aspect-ratio:1;background:#ede8e0;overflow:hidden;position:relative;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.card-info{padding:10px; font-size:12px;}
.card-name{font-weight:900; color:var(--deep); margin-bottom:5px;}
.badge{display:inline-block; padding:2px 6px; border-radius:4px; background:var(--bg); margin:2px; font-size:10px; color:var(--text2);}

/* الأزرار والنماذج */
.fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;border:none;border-radius:28px;padding:13px 26px;font-weight:800;z-index:40;cursor:pointer;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100;}
.drawer{background:#fff; width:90%; max-width:450px; border-radius:20px; padding:20px; max-height:90vh; overflow-y:auto;}
.fg{margin-bottom:10px;}
.fg label{display:block; font-size:12px; font-weight:700; margin-bottom:4px;}
.fg input{width:100%; padding:10px; border-radius:10px; border:1px solid var(--border); outline:none;}
.btn-save{width:100%; padding:14px; background:var(--deep); color:#fff; border:none; border-radius:10px; font-weight:800; margin-top:10px; cursor:pointer;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div style="font-weight:900">حقائب التوريد 👜</div>
    <div class="hcount" id="hcount">0 حقيبة</div>
  </div>
</div>

<div class="gallery" id="gallery"></div>

<button class="fab" onclick="document.getElementById('ov').style.display='flex'">➕ إضافة حقيبة جديدة</button>

<div class="ov" id="ov" onclick="if(event.target==this)this.style.display='none'">
  <div class="drawer">
    <h3 style="margin-bottom:15px">بيانات الحقيبة الجديدة</h3>
    <div class="fg"><label>رابط المنتج</label><input type="url" id="urlInp" placeholder="انسخ الرابط هنا"></div>
    <div class="fg"><label>الاسم (اختياري)</label><input type="text" id="nameInp"></div>
    <div class="fg"><label>السعر (TL)</label><input type="text" id="priceInp"></div>
    <div class="fg"><label>القياسات (S, M, L...)</label><input type="text" id="sizeInp"></div>
    <div class="fg"><label>الخامة والماركة</label><input type="text" id="brandInp"></div>
    <div class="fg"><label>الألوان</label><input type="text" id="colorInp"></div>
    <div class="fg"><label>اسم الشخص المضيف</label><input type="text" id="userInp" placeholder="من أنت؟"></div>
    <button class="btn-save" onclick="saveToCloud()">💾 حفظ ومزامنة مع الجميع</button>
  </div>
</div>

<script>
// إعدادات Firebase من صورتك
const firebaseConfig = {
  apiKey: "AIzaSyDae0M8CdKmahKD78YICAON5VC01aG43cM",
  authDomain: "haqaibi-50ba4.firebaseapp.com",
  databaseURL: "https://haqaibi-50ba4-default-rtdb.firebaseio.com/",
  projectId: "haqaibi-50ba4",
  storageBucket: "haqaibi-50ba4.firebasestorage.app",
  messagingSenderId: "461111216258",
  appId: "1:461111216258:web:694ad5d112f60a01274c9b"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// دالة الحفظ السحابي
async function saveToCloud() {
  const url = document.getElementById('urlInp').value;
  if(!url) return alert('يرجى وضع الرابط أولاً');

  const newBag = {
    url: url,
    name: document.getElementById('nameInp').value || 'حقيبة جديدة',
    price: document.getElementById('priceInp').value,
    size: document.getElementById('sizeInp').value,
    brand: document.getElementById('brandInp').value,
    colors: document.getElementById('colorInp').value,
    addedBy: document.getElementById('userInp').value || 'مجهول',
    timestamp: Date.now()
  };

  await db.ref('bags').push(newBag);
  document.getElementById('ov').style.display = 'none';
  alert('تمت الإضافة بنجاح وتظهر الآن عند الجميع!');
}

// دالة عرض البيانات فور حدوث أي تغيير عند أي شخص
db.ref('bags').on('value', (snapshot) => {
  const data = snapshot.val();
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  let count = 0;

  for (let id in data) {
    count++;
    const b = data[id];
    gallery.innerHTML += `
      <div class="card">
        <div class="card-thumb" onclick="window.open('${b.url}', '_blank')">
          <div style="display:flex; height:100%; align-items:center; justify-content:center; font-size:40px">👜</div>
        </div>
        <div class="card-info">
          <div class="card-name">${b.name}</div>
          <div style="color:var(--gold); font-weight:bold; margin-bottom:5px">${b.price || '--'} TL</div>
          <div class="badge">📏 ${b.size || 'غير محدد'}</div>
          <div class="badge">🏷️ ${b.brand || '--'}</div>
          <div class="badge">🎨 ${b.colors || '--'}</div>
          <div style="margin-top:8px; font-size:10px; color:#bbb">بواسطة: ${b.addedBy}</div>
        </div>
      </div>
    `;
  }
  document.getElementById('hcount').textContent = count + ' حقيبة';
});
</script>
</body>
</html>
