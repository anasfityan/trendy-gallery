<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Trendy Gallery</title>
<meta name="theme-color" id="themeColor" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trendy">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ══ TOKENS ══ */
:root{
  --bg:#f0ede8;--bg2:#e8e3dc;--card:#fff;--deep:#0d0d0d;
  --gold:#c8962e;--gold-l:#f0c96a;--gold-dim:rgba(200,150,46,.12);
  --text:#1a1410;--text2:#9a8a78;--text3:#c8b9a8;
  --border:#ddd5c8;--border2:#ede6dd;
  --green:#1e8a50;--red:#c0392b;
  --hdr-from:#141210;--hdr-to:#0d0b09;
  --card-sh:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.07);
  --card-sh-hov:0 4px 20px rgba(0,0,0,.13),0 1px 4px rgba(0,0,0,.07);
  --sb:#09090a;--drawer:#fff;
}
[data-theme="dark"]{
  --bg:#0b0b0b;--bg2:#111;--card:#181818;--deep:#000;
  --text:#ede8e0;--text2:#555;--text3:#333;
  --border:#252525;--border2:#1e1e1e;
  --hdr-from:#050505;--hdr-to:#020202;
  --card-sh:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.5);
  --card-sh-hov:0 4px 20px rgba(0,0,0,.7),0 1px 4px rgba(0,0,0,.4);
  --sb:#040404;--drawer:#181818;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overscroll-behavior:none;}
[data-lang="en"]{direction:ltr;}

/* ══ SPLASH ══ */
#splash{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .55s,transform .55s;}
#splash.hide{opacity:0;transform:scale(1.04);pointer-events:none;}
.sp-icon{width:80px;height:80px;border-radius:20px;overflow:hidden;margin-bottom:16px;animation:spop .65s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 40px rgba(200,150,46,.18);}
.sp-icon img{width:100%;height:100%;object-fit:cover;}
.sp-wm{display:flex;gap:4px;margin-bottom:5px;}
.sp-w1{color:#fff;font-size:20px;font-weight:900;}
.sp-w2{color:var(--gold);font-size:20px;font-weight:900;}
.sp-sub{color:rgba(255,255,255,.18);font-size:11px;letter-spacing:.4px;}
.sp-ring{width:24px;height:24px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-top:20px;}
@keyframes spop{from{transform:scale(.25);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}

/* ══ SIDEBAR ══ */
.sb-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;opacity:0;pointer-events:none;transition:opacity .24s;}
.sb-ov.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;top:0;right:0;bottom:0;width:252px;background:var(--sb);z-index:201;transform:translateX(104%);transition:transform .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-left:1px solid rgba(255,255,255,.035);}
[data-lang="en"] .sidebar{right:auto;left:0;transform:translateX(-104%);border-left:none;border-right:1px solid rgba(255,255,255,.035);}
.sb-ov.open .sidebar{transform:translateX(0);}

/* sidebar header */
.sb-hd{padding:18px 15px 13px;border-bottom:1px solid rgba(255,255,255,.04);}
.sb-logo-row{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.sb-logo-img{width:30px;height:30px;border-radius:8px;overflow:hidden;flex-shrink:0;}
.sb-logo-img img{width:100%;height:100%;object-fit:cover;}
.sb-wm{display:flex;gap:3px;}
.sb-w1{color:#fff;font-size:14px;font-weight:900;}
.sb-w2{color:var(--gold);font-size:14px;font-weight:900;}
.sb-tagline{color:rgba(255,255,255,.14);font-size:9px;letter-spacing:.3px;margin-bottom:10px;}
.live-row{display:flex;align-items:center;gap:6px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:lp 2s infinite;flex-shrink:0;}
@keyframes lp{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}70%{box-shadow:0 0 0 5px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);}}
.live-txt{color:rgba(255,255,255,.2);font-size:9px;}

/* sidebar scroll body */
.sb-body{flex:1;overflow-y:auto;padding:6px 0;}
.sb-body::-webkit-scrollbar{width:0;}
.sb-sect{padding:0 8px;margin-bottom:2px;}
.sb-lbl{font-size:8px;font-weight:700;color:rgba(255,255,255,.14);text-transform:uppercase;letter-spacing:.8px;padding:7px 5px 4px;}

/* categories in sidebar */
.cat-list{display:flex;flex-direction:column;gap:1px;}
.cat-sb-btn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .12s;}
.cat-sb-btn:hover{background:rgba(255,255,255,.04);}
.cat-sb-btn.on{background:var(--gold-dim);}
.cat-ico{font-size:16px;width:24px;text-align:center;}
.cat-info{flex:1;}
.cat-nm{font-size:12px;color:rgba(255,255,255,.55);font-weight:500;}
.cat-sb-btn.on .cat-nm{color:var(--gold);}
.cat-cnt{font-size:9px;color:rgba(255,255,255,.18);}
.cat-sb-btn.on .cat-cnt{color:rgba(200,150,46,.4);}

/* history pills */
.hist-row{display:flex;flex-wrap:wrap;gap:4px;padding:2px 2px 5px;}
.hp{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;background:rgba(255,255,255,.04);color:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.06);transition:all .12s;}
.hp.on{background:var(--gold-dim);color:var(--gold);border-color:rgba(200,150,46,.25);}

/* lang pills */
.lang-row{display:flex;background:rgba(255,255,255,.04);border-radius:7px;padding:2px;gap:1px;}
.lp-btn{flex:1;text-align:center;padding:5px 6px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.25);transition:all .16s;}
.lp-btn.on{background:var(--gold);color:#0d0d0d;}

/* theme row */
.sb-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:8px;cursor:pointer;transition:background .12s;}
.sb-item:hover{background:rgba(255,255,255,.03);}
.sb-item-l{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.55);}
.sb-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(255,255,255,.05);flex-shrink:0;}
.sb-sub-txt{font-size:9px;color:rgba(255,255,255,.18);margin-top:1px;}
.thm-tr{width:36px;height:19px;background:rgba(255,255,255,.09);border-radius:10px;position:relative;cursor:pointer;transition:background .22s;flex-shrink:0;}
.thm-tr.on{background:var(--gold);}
.thm-kn{width:13px;height:13px;background:#fff;border-radius:50%;position:absolute;top:3px;right:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.thm-tr.on .thm-kn{transform:translateX(-17px);}
[data-lang="en"] .thm-kn{right:auto;left:3px;}
[data-lang="en"] .thm-tr.on .thm-kn{transform:translateX(17px);}

.sb-div{height:1px;background:rgba(255,255,255,.04);margin:5px 8px;}

/* sidebar footer */
.sb-foot{padding:10px 15px;border-top:1px solid rgba(255,255,255,.04);}
.sb-ver{font-size:9px;color:rgba(255,255,255,.12);margin-bottom:2px;}
.sb-credit{font-size:9px;color:rgba(255,255,255,.18);}
.sb-credit span{color:var(--gold);}

/* ══ HEADER ══ */
.hdr{background:linear-gradient(180deg,var(--hdr-from),var(--hdr-to));padding:10px 13px 9px;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(255,255,255,.03),0 2px 12px rgba(0,0,0,.25);}
.hdr-inner{display:flex;align-items:center;gap:7px;}
.menu-btn{width:30px;height:30px;border:none;background:rgba(255,255,255,.07);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s;}
.menu-btn:active{background:rgba(255,255,255,.14);}
.menu-btn svg{width:14px;height:14px;stroke:rgba(255,255,255,.6);stroke-width:1.8;fill:none;stroke-linecap:round;}
.hdr-brand{flex:1;}
.hdr-wm{display:flex;gap:3px;line-height:1;}
.hw1{color:#fff;font-size:13px;font-weight:900;}
.hw2{color:var(--gold);font-size:13px;font-weight:900;}
.hdr-gr{font-size:9px;color:rgba(255,255,255,.4);margin-top:2px;letter-spacing:.1px;}
/* search pill */
.srch-pill{height:27px;background:rgba(255,255,255,.08);border-radius:7px;display:flex;align-items:center;gap:4px;padding:0 9px;cursor:text;border:1px solid rgba(255,255,255,.04);flex-shrink:0;}
.srch-pill .si{font-size:11px;opacity:.35;}
.srch-pill span{font-size:10px;color:rgba(255,255,255,.25);}
/* theme btn in header (replaces filter dropdown) */
.hdr-acts{display:flex;align-items:center;gap:3px;}
.hbtn{width:28px;height:28px;border:none;background:rgba(255,255,255,.07);border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:rgba(255,255,255,.6);transition:all .12s;flex-shrink:0;}
.hbtn:active{background:rgba(255,255,255,.15);}

/* ══ SEARCH OVERLAY ══ */
.srch-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(5px);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s;}
.srch-ov.open{opacity:1;pointer-events:all;}
.srch-box{position:absolute;top:9px;left:9px;right:9px;background:var(--drawer);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 28px rgba(0,0,0,.2);}
.srch-box input{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;color:var(--text);outline:none;}
.srch-box input::placeholder{color:var(--text2);}
.srch-x{font-size:15px;color:var(--text2);cursor:pointer;border:none;background:none;}

/* ══ GALLERY ══ */
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:8px 8px 90px;}

/* ══ CARD ══ */
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--card-sh);animation:pop .22s cubic-bezier(.34,1.56,.64,1) both;transition:transform .18s,box-shadow .18s;}
.card:active{transform:scale(.98);}
[data-theme="dark"] .card{border-color:rgba(255,255,255,.055);}
@keyframes pop{from{opacity:0;transform:scale(.91);}to{opacity:1;transform:scale(1);}}

/* thumb — taller ratio, cover to fill */
.card-thumb{width:100%;aspect-ratio:2/3;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;cursor:zoom-in;}
[data-theme="dark"] .card-thumb{background:#111;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s;}
.card-thumb:active img{transform:scale(1.06);}
.sdot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);}
[data-lang="en"] .sdot{right:auto;left:5px;}
.sa{background:var(--green);}.su{background:var(--red);}.sk{background:var(--gold);}
.price-tag{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.76);color:#fff;border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;backdrop-filter:blur(3px);}
[data-lang="en"] .price-tag{left:auto;right:5px;}
.dup-badge{position:absolute;top:5px;left:5px;background:rgba(192,57,43,.85);color:#fff;border-radius:4px;padding:1px 5px;font-size:8px;font-weight:700;}
/* retry overlay inside thumb */
.retry-ov{position:absolute;inset:0;background:rgba(0,0,0,.32);display:none;align-items:center;justify-content:center;}
.retry-ov.show{display:flex;}
.retry-ico{width:38px;height:38px;background:rgba(200,150,46,.92);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;box-shadow:0 2px 10px rgba(0,0,0,.3);}

.card-name{font-size:10px;font-weight:700;color:var(--text);line-height:1.3;padding:5px 7px 2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cdots{display:flex;gap:2px;flex-wrap:wrap;padding:2px 7px 4px;}
.cdot-c{width:9px;height:9px;border-radius:50%;border:1px solid rgba(128,128,128,.15);flex-shrink:0;}

/* 3 action buttons */
.card-acts{display:flex;border-top:1px solid var(--border);}
[data-theme="dark"] .card-acts{border-color:rgba(255,255,255,.05);}
.ca{flex:1;padding:6px 2px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px;font-size:9px;color:var(--text2);font-family:inherit;transition:background .1s;}
.ca:not(:last-child){border-left:1px solid var(--border);}
[data-theme="dark"] .ca:not(:last-child){border-left-color:rgba(255,255,255,.05);}
[data-lang="en"] .ca:not(:last-child){border-left:none;border-right:1px solid var(--border);}
.ca:active{background:var(--gold-dim);}
.ca .ci{font-size:13px;}
.ca.ca-open{color:var(--gold);}

.empty{text-align:center;padding:56px 20px;grid-column:1/-1;}
.empty .ei{font-size:42px;margin-bottom:8px;opacity:.5;}
.empty p{color:var(--text2);font-size:13px;}

/* ══ FAB ══ */
.fab{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;border:none;border-radius:22px;padding:10px 20px;font-family:inherit;font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;cursor:pointer;box-shadow:0 4px 18px rgba(0,0,0,.32),0 1px 4px rgba(0,0,0,.15);z-index:40;}
.fab:active{transform:translateX(-50%) scale(.95);}
.fab-dot{width:5px;height:5px;background:var(--gold);border-radius:50%;}

/* ══ LIGHTBOX ══ */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;}
.lb img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:8px;}
.lb-x{position:absolute;top:12px;right:12px;width:30px;height:30px;background:rgba(255,255,255,.1);border-radius:50%;border:none;color:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ══ DRAWER ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(5px);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
.ov.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--drawer);border-radius:18px 18px 0 0;padding:0 0 env(safe-area-inset-bottom,16px);max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .26s cubic-bezier(.32,.72,0,1);z-index:101;}
.ov.open .drawer{transform:translateY(0);}
.dhandle{width:28px;height:3px;background:var(--border);border-radius:2px;margin:9px auto 0;}
.dhead{padding:10px 15px 0;display:flex;align-items:center;justify-content:space-between;}
.dtitle{font-size:14px;font-weight:900;color:var(--text);}
.dclose{width:25px;height:25px;background:var(--bg);border-radius:6px;border:none;cursor:pointer;font-size:13px;color:var(--text2);}
.dbody{padding:10px 15px;}

/* form */
.fg{margin-bottom:9px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:8px 10px;font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border .18s;resize:none;-webkit-appearance:none;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--gold);}
[data-theme="dark"] .fg select option{background:#222;}

/* image area */
.img-area{position:relative;width:100%;aspect-ratio:4/3;background:var(--bg);border-radius:10px;overflow:hidden;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px;}
[data-theme="dark"] .img-area{background:#111;}
.img-area img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;}
.fetch-spin{position:absolute;inset:0;background:rgba(0,0,0,.38);display:none;align-items:center;justify-content:center;}
.fetch-spin.show{display:flex;}
.fs-ring{width:22px;height:22px;border:2px solid rgba(255,255,255,.12);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;}
/* big retry overlay */
.img-retry-ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.25);}
.img-retry-ov.show{display:flex;}
.retry-big{width:46px;height:46px;background:rgba(200,150,46,.92);border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;box-shadow:0 2px 14px rgba(0,0,0,.3);}
/* save indicator */
.save-bar{width:100%;background:var(--deep);color:#fff;border:none;border-radius:10px;padding:12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;position:relative;transition:background .2s;}
.save-bar:disabled{opacity:.3;cursor:not-allowed;}
.save-bar.done{background:#1e8a50;}
.save-spinner{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
[data-lang="en"] .save-spinner{right:auto;left:14px;}
.save-spinner.show{display:block;}
.save-check{display:none;position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;}
[data-lang="en"] .save-check{right:auto;left:14px;}
.save-check.show{display:block;}

/* image action row */
.img-acts{display:flex;gap:6px;margin-bottom:8px;}
.img-act{flex:1;padding:7px 4px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-family:inherit;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:border .15s;}
.img-act:active{border-color:var(--gold);color:var(--gold);}

/* edit delete row */
.edit-del-row{display:flex;gap:6px;}
.btn-edit-save{flex:1;padding:11px;border-radius:10px;border:none;background:var(--deep);color:#fff;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}
.btn-del{width:44px;padding:11px 0;border-radius:10px;border:none;background:rgba(192,57,43,.85);color:#fff;font-family:inherit;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* detail */
.det-img{width:100%;aspect-ratio:4/3;object-fit:contain;border-radius:10px;margin-bottom:10px;display:block;cursor:zoom-in;background:var(--bg);}
.det-img-ph{width:100%;aspect-ratio:4/3;background:var(--bg);border-radius:10px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:44px;}
.det-name{font-size:15px;font-weight:900;margin-bottom:3px;}
.det-price{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:6px;}
.det-status{display:inline-block;padding:3px 10px;border-radius:14px;font-size:10px;font-weight:700;margin-bottom:8px;}
.ds-a{background:rgba(30,138,80,.1);color:var(--green);}
.ds-u{background:rgba(192,57,43,.1);color:var(--red);}
.ds-k{background:rgba(200,150,46,.1);color:var(--gold);}
.det-colors{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px;}
.det-sw{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:2px 8px;font-size:10px;}
.det-sd{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.det-note{font-size:11px;color:var(--text2);background:var(--bg);border-radius:7px;padding:6px 9px;margin-bottom:10px;line-height:1.5;}
.det-btns{display:flex;gap:6px;}
.dbtn{flex:1;padding:10px 3px;border-radius:9px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;text-align:center;}

<script>
const GS='https://script.google.com/macros/s/AKfycbwAsRo6SpOYqMfcWxFbl2gqLLjbEYjVvecSIVAfO-IFrM0Gek4uc0vhhukZqwH71hI/exec';
const VER='1.0.0';

// ── CATEGORY KEYWORDS (auto-detect) ──
const CAT_KW={
  shoes:['shoe','ayakkabi','حذاء','حذا','أحذية','احذيه','sneaker','boot','loafer','sandal','terlik','bot','scarpa','zapato','chaussure','babet','topuklu'],
  clothes:['dress','shirt','blouse','skirt','jacket','coat','elbise','gömlek','pantolon','mont','ceket','kazak','hırka','ملابس','فستان','قميص','بلوزة','تنورة','معطف','بنطلون'],
  acc:['watch','necklace','bracelet','ring','earring','belt','scarf','saat','kolye','bileklik','yüzük','kemer','eşarp','اكسسوار','ساعة','قلادة','سوار','خاتم','حزام','وشاح','cüzdan','çanta aksesuarı'],
  bags:['bag','canta','حقيب','جنط','شنط','handbag','backpack','clutch','tote','baget','omuz çanta','sırt çanta','el çanta','kol çanta','çanta']
};
function detectCat(url,name){
  const s=(url+' '+(name||'')).toLowerCase();
  for(const[c,kws]of Object.entries(CAT_KW)){if(kws.some(k=>s.includes(k)))return c;}
  return curCat||'bags';
}

const CATS=[
  {id:'bags',   ico:'👜',ar:'حقائب',    en:'Bags'},
  {id:'shoes',  ico:'👟',ar:'أحذية',    en:'Shoes'},
  {id:'clothes',ico:'👗',ar:'ملابس',    en:'Clothes'},
  {id:'acc',    ico:'💍',ar:'اكسسوارات',en:'Accessories'},
];

const CM={'أسود':'#1a1a1a','أبيض':'#f5f5f5','أحمر':'#e53935','أزرق':'#1565c0','أخضر':'#2e7d32','أصفر':'#f9a825','وردي':'#e91e8c','بنفسجي':'#7b1fa2','برتقالي':'#e65100','رمادي':'#757575','بني':'#795548','بيج':'#d4b896','كريمي':'#f5f0e8','كحلي':'#1a237e','ذهبي':'#f0b429','فضي':'#9e9e9e','كاراميل':'#c4874e','خمري':'#880e4f','زيتي':'#558b2f','تركواز':'#00838f','بوردو':'#800020','bordo':'#800020','siyah':'#1a1a1a','beyaz':'#f5f5f5','kirmizi':'#e53935','mavi':'#1565c0','pembe':'#e91e8c','gri':'#757575','kahverengi':'#795548','bej':'#d4b896','lacivert':'#1a237e','black':'#1a1a1a','white':'#f5f5f5','red':'#e53935','blue':'#1565c0','green':'#2e7d32','pink':'#e91e8c','grey':'#757575','gray':'#757575','brown':'#795548','beige':'#d4b896','navy':'#1a237e','camel':'#c4874e','burgundy':'#800020'};
function cHex(n){if(!n)return'#bbb';const l=n.toLowerCase().trim();for(const[k,v]of Object.entries(CM)){if(l.includes(k))return v;}return'#bdbdbd';}

const T={
  ar:{fab:'إضافة',save:'💾 حفظ',save_edit:'حفظ التعديل',open:'فتح',edit:'تعديل',del:'حذف',sync:'مزامنة',dark:'الوضع الداكن',light:'الوضع الفاتح',lbl_lang:'اللغة',lbl_appear:'المظهر',lbl_hist:'آخر الإضافات',lbl_cats:'التصنيفات',live:'متصل • جميع الأجهزة',srch:'ابحث...',url_lbl:'رابط المنتج',img_lbl:'رابط الصورة',name_lbl:'الاسم',cat_lbl:'التصنيف (تلقائي)',upload:'رفع صورة',manual:'رابط يدوي',add_t:'إضافة',edit_t:'تعديل',detail_t:'تفاصيل',fetch_ok:'✅ تم جلب الصورة',fetch_fail:'📸 لم تُجلب — أضف يدوياً',saved:'✅ تم الحفظ',deleted:'🗑️ تم الحذف',copied:'📋 تم نسخ الرابط',synced:'✅ تم التحديث',fail:'⚠️ تعذّر الاتصال',empty:'أضف أول عنصر!',nores:'لا توجد نتائج',copy_txt:'نسخ',hp_all:'الكل',hp_w:'أسبوع',hp_m:'شهر',hp_2m:'شهرين',hp_3m:'3 أشهر',dup_warn:'⚠️ هذا الرابط موجود بالفعل!',good_morning:'صباح الخير',good_afternoon:'مساء الخير',good_evening:'مساء الخير',good_night:'طاب مساؤك',items:'عنصر'},
  en:{fab:'Add',save:'💾 Save',save_edit:'Save Edit',open:'Open',edit:'Edit',del:'Delete',sync:'Sync',dark:'Dark Mode',light:'Light Mode',lbl_lang:'Language',lbl_appear:'Appearance',lbl_hist:'Recent',lbl_cats:'Categories',live:'Live • All Devices',srch:'Search...',url_lbl:'Product URL',img_lbl:'Image URL',name_lbl:'Name',cat_lbl:'Category (auto)',upload:'Upload image',manual:'Manual URL',add_t:'Add',edit_t:'Edit',detail_t:'Details',fetch_ok:'✅ Image fetched',fetch_fail:'📸 Not found — add manually',saved:'✅ Saved',deleted:'🗑️ Deleted',copied:'📋 Link copied',synced:'✅ Updated',fail:'⚠️ Connection failed',empty:'Add your first item!',nores:'No results',copy_txt:'Copy',hp_all:'All',hp_w:'Week',hp_m:'Month',hp_2m:'2 Months',hp_3m:'3 Months',dup_warn:'⚠️ This URL already exists!',good_morning:'Good morning',good_afternoon:'Good afternoon',good_evening:'Good evening',good_night:'Good night',items:'items'}
};
function t(k){return T[lang]?.[k]||k;}

let bags=[],histFilt='all',curCat='bags',curBagId=null,lang='ar',dark=false,curImg='',lastUrl='',manualOpen=false,saving=false;
function loadLocal(){try{bags=JSON.parse(localStorage.getItem('tg_v6')||'[]');}catch(e){bags=[];}}
function saveLocal(){localStorage.setItem('tg_v6',JSON.stringify(bags));}

// ── DEDUP ──
function dedup(){
  const seen=new Set();
  bags=bags.filter(b=>{const k=b.url||b.id;if(seen.has(k))return false;seen.add(k);return true;});
}

// ── GREETING ──
function greeting(){
  const h=new Date().getHours();
  const k=h<12?'good_morning':h<17?'good_afternoon':h<21?'good_evening':'good_night';
  const el=document.getElementById('greeting');
  if(el)el.textContent=t(k);
}

// ── CAT SELECT ──
function populateCatSelect(){
  const s=document.getElementById('catInp');
  s.innerHTML=CATS.map(c=>`<option value="${c.id}">${c.ico} ${lang==='ar'?c.ar:c.en}</option>`).join('');
  s.value=curCat;
}

// ── CAT LIST ──
function buildCats(){
  const el=document.getElementById('catList');
  el.innerHTML=CATS.map(c=>{
    const cnt=bags.filter(b=>b.cat===c.id).length;
    return`<div class="cat-sb-btn${curCat===c.id?' on':''}" onclick="setCat('${c.id}');closeSB();">
      <div class="cat-ico">${c.ico}</div>
      <div class="cat-info"><div class="cat-nm">${lang==='ar'?c.ar:c.en}</div><div class="cat-cnt">${cnt}</div></div>
    </div>`;
  }).join('');
}
function setCat(c){curCat=c;buildCats();render();}

// ── LANG ──
function setLang(l){
  lang=l;
  document.documentElement.setAttribute('data-lang',l);
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.getElementById('lp-ar').classList.toggle('on',l==='ar');
  document.getElementById('lp-en').classList.toggle('on',l==='en');
  applyT();buildCats();greeting();populateCatSelect();
  localStorage.setItem('tg_lang',l);playClick();
}
function applyT(){
  const m={'fabTxt':'fab','srchHint':'srch','lbl-url':'url_lbl','lbl-imgurl':'img_lbl','lbl-upload':'upload','lbl-manual':'manual','lbl-name':'name_lbl','lbl-cat':'cat_lbl','saveTxt':'save','saveEditTxt':'save_edit','d-open-txt':'open','d-edit-txt':'edit','d-del-txt':'del','sb-sync-txt':'sync','lbl-lang':'lbl_lang','lbl-appear':'lbl_appear','lbl-hist':'lbl_hist','lbl-cats':'lbl_cats','liveTxt':'live','hp-all':'hp_all','hp-w':'hp_w','hp-m':'hp_m','hp-2m':'hp_2m','hp-3m':'hp_3m'};
  Object.entries(m).forEach(([id,k])=>{const el=document.getElementById(id);if(el)el.textContent=t(k);});
  document.getElementById('srchInp').placeholder=t('srch');
  document.getElementById('sbThLbl').textContent=dark?t('light'):t('dark');
  document.getElementById('sbThIco').textContent=dark?'☀️':'🌙';
  document.getElementById('sbVer').textContent=`v${VER} • Trendy Gallery`;
  document.getElementById('sbCount').textContent=bags.filter(b=>b.cat===curCat).length+' '+t('items');
}

// ── THEME ──
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('thmTr').classList.toggle('on',dark);
  document.getElementById('hThBtn').textContent=dark?'☀️':'🌙';
  document.getElementById('sbThLbl').textContent=dark?t('light'):t('dark');
  document.getElementById('sbThIco').textContent=dark?'☀️':'🌙';
  document.getElementById('themeColor')?.setAttribute('content',dark?'#050505':'#0d0d0d');
  localStorage.setItem('tg_dark',dark?'1':'0');
  playClick();
}

// ── SOUND ──
function playClick(f=780,d=.08){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function playOpen(){playClick(500,.2);}

// ── SIDEBAR ──
function openSB(){document.getElementById('sbOv').classList.add('open');playOpen();}
function closeSB(){document.getElementById('sbOv').classList.remove('open');}

// ── SEARCH ──
function openSearch(){document.getElementById('srchOv').classList.add('open');setTimeout(()=>document.getElementById('srchInp').focus(),200);}
function closeSearch(){document.getElementById('srchOv').classList.remove('open');document.getElementById('srchInp').value='';render();}

// ── HISTORY ──
function setHP(f,el){histFilt=f;document.querySelectorAll('.hp').forEach(x=>x.classList.remove('on'));el.classList.add('on');render();playClick();}
function histOk(b){
  if(histFilt==='all')return true;if(!b.addedAt)return true;
  const days={week:7,month:30,'2m':60,'3m':90}[histFilt]||9999;
  return(Date.now()-new Date(b.addedAt).getTime())/86400000<=days;
}

// ── SHEETS ──
async function syncSheets(){
  document.getElementById('liveTxt').textContent=lang==='ar'?'جاري التحديث...':'Syncing...';
  try{
    const r=await fetch(GS+'?t='+Date.now());
    const d=await r.json();
    if(Array.isArray(d)){
      // merge remote into local — prefer local for same id
      const localMap=new Map(bags.map(b=>[b.id,b]));
      for(const rb of d){
        if(!localMap.has(rb.id)){
          localMap.set(rb.id,{id:rb.id,name:rb.name||'',url:rb.url||'',img:rb.img||'',price:rb.price||'',colors:rb.colors||'',note:rb.note||'',status:rb.status||'available',addedAt:rb.addedAt||'',cat:rb.cat||'bags'});
        }
      }
      bags=[...localMap.values()];
      dedup();saveLocal();render();buildCats();
      toast(t('synced')+' — '+bags.length);
    }
  }catch(e){toast(t('fail'));}
  document.getElementById('liveTxt').textContent=t('live');
  applyT();
}
async function pushSheets(){
  try{await fetch(GS,{method:'POST',body:JSON.stringify({action:'save',bags}),headers:{'Content-Type':'text/plain'}});}catch(e){}
}

// ── IMAGE FETCH ──
async function tryFetch(url){
  const enc=encodeURIComponent(url);
  const fns=[
    async()=>{const r=await fetch(`https://api.allorigins.win/get?url=${enc}`,{signal:AbortSignal.timeout(7000)});const d=await r.json();const h=d.contents||'';const m=h.match(/property=["']og:image["'][^>]*content=["']([^"']+)["']/i)||h.match(/content=["']([^"']+)["'][^>]*property=["']og:image["']/i)||h.match(/name=["']twitter:image["'][^>]*content=["']([^"']+)["']/i);if(m&&m[1]&&m[1].startsWith('http'))return{img:m[1],name:((h.match(/<title[^>]*>([^<]+)<\/title>/i)||[])[1]||'').trim().slice(0,50)};throw'x';},
    async()=>{const r=await fetch(`https://corsproxy.io/?${enc}`,{signal:AbortSignal.timeout(7000)});const h=await r.text();const m=h.match(/property=["']og:image["'][^>]*content=["']([^"']+)["']/i)||h.match(/content=["']([^"']+)["'][^>]*property=["']og:image["']/i);if(m&&m[1]&&m[1].startsWith('http'))return{img:m[1],name:''};throw'x';},
    async()=>{const r=await fetch(`https://api.microlink.io/?url=${enc}`,{signal:AbortSignal.timeout(7000)});const d=await r.json();if(d?.data?.image?.url)return{img:d.data.image.url,name:d.data?.title||''};throw'x';},
    async()=>{const r=await fetch(`https://jsonlink.io/api/extract?url=${enc}`,{signal:AbortSignal.timeout(7000)});const d=await r.json();if(d?.images?.[0])return{img:d.images[0],name:d.title||''};throw'x';},
  ];
  const rs=await Promise.allSettled(fns.map(f=>f()));
  for(const r of rs){if(r.status==='fulfilled'&&r.value?.img)return r.value;}
  return null;
}
async function doFetch(url){
  lastUrl=url;curImg='';
  showSpin(true);showRetry(false);clearImg();
  const res=await tryFetch(url);
  showSpin(false);
  if(res?.img){
    curImg=res.img;setImg(res.img);
    if(res.name&&!document.getElementById('nameInp').value)document.getElementById('nameInp').value=res.name;
    const ac=detectCat(url,res.name);
    document.getElementById('catInp').value=ac;
    document.getElementById('imgManualWrap').style.display='none';
    toast(t('fetch_ok'));
  }else{showRetry(true);toast(t('fetch_fail'));}
}
function showSpin(on){document.getElementById('fetchSpin').classList.toggle('show',on);}
function showRetry(on){document.getElementById('imgRetryOv').classList.toggle('show',on);}
function clearImg(){const a=document.getElementById('imgArea');const i=a.querySelector('img');if(i)i.remove();document.getElementById('imgPH').style.display='flex';}
function setImg(src){
  const a=document.getElementById('imgArea');document.getElementById('imgPH').style.display='none';
  let img=a.querySelector('img');if(!img){img=document.createElement('img');a.appendChild(img);}
  img.src=src;img.onerror=()=>{img.remove();document.getElementById('imgPH').style.display='flex';showRetry(true);curImg='';};
}
function retryFetch(){const u=document.getElementById('urlInp').value.trim();if(u){playClick();doFetch(u);}}
function triggerFile(){document.getElementById('fileIn').click();}
function handleFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{curImg=ev.target.result;setImg(ev.target.result);showRetry(false);};r.readAsDataURL(f);e.target.value='';}
function toggleManual(){manualOpen=!manualOpen;document.getElementById('imgManualWrap').style.display=manualOpen?'block':'none';if(manualOpen)setTimeout(()=>document.getElementById('imgInp').focus(),150);}

let debT=null;
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('urlInp').addEventListener('input',function(){
    const u=this.value.trim();
    document.getElementById('saveBtn').disabled=!u;
    clearTimeout(debT);if(!u||!u.startsWith('http')||u===lastUrl)return;
    // instant cat detect from URL
    document.getElementById('catInp').value=detectCat(u,'');
    debT=setTimeout(()=>doFetch(u),900);
  });
  document.getElementById('imgInp').addEventListener('input',function(){const u=this.value.trim();if(u){curImg=u;setImg(u);}});
  document.getElementById('saveBtn').disabled=true;

  // keyboard-aware: scroll active input into view
  ['urlInp','imgInp','nameInp','e-url','e-img','e-name','e-price','e-colors','e-note'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('focus',()=>setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'center'}),300));
  });
  loadPrefs();
});

// ── SAVE ──
async function saveBag(){
  if(saving)return;
  const url=document.getElementById('urlInp').value.trim();if(!url)return;
  const eid=document.getElementById('editId').value;
  // duplicate check
  if(bags.some(b=>b.url===url&&b.id!==eid)){toast(t('dup_warn'));return;}
  saving=true;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;
  document.getElementById('saveSpin').classList.add('show');
  document.getElementById('saveTxt').textContent='';

  const cat=document.getElementById('catInp').value||curCat;
  const bag={
    id:eid||Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    name:document.getElementById('nameInp').value.trim()||urlToName(url),
    url,img:curImg||document.getElementById('imgInp').value.trim(),
    price:'',colors:'',note:'',status:'available',cat,
    addedAt:eid?(bags.find(b=>b.id===eid)?.addedAt||new Date().toISOString()):new Date().toISOString()
  };
  if(eid){const i=bags.findIndex(b=>b.id===eid);if(i>=0)bags[i]=bag;else bags.unshift(bag);}
  else bags.unshift(bag);
  saveLocal();

  // show check immediately
  document.getElementById('saveSpin').classList.remove('show');
  document.getElementById('saveCheck').classList.add('show');
  document.getElementById('saveTxt').textContent='';
  btn.classList.add('done');
  toast(t('saved'));

  // push async
  pushSheets();
  closeD();render();buildCats();
  saving=false;
  setTimeout(()=>{document.getElementById('saveCheck').classList.remove('show');btn.classList.remove('done');document.getElementById('saveTxt').textContent=t('save');btn.disabled=false;},1500);
}
async function saveEdit(){
  const eid=document.getElementById('eid2').value;if(!eid)return;
  const i=bags.findIndex(b=>b.id===eid);if(i<0)return;
  bags[i]={...bags[i],url:document.getElementById('e-url').value.trim(),img:document.getElementById('e-img').value.trim(),name:document.getElementById('e-name').value.trim(),price:document.getElementById('e-price').value.trim(),colors:document.getElementById('e-colors').value.trim(),note:document.getElementById('e-note').value.trim()};
  saveLocal();pushSheets();toast(t('saved'));closeD();render();
}
function deleteFromEdit(){
  const eid=document.getElementById('eid2').value;if(!eid)return;
  if(!confirm(t('del')+'?'))return;
  bags=bags.filter(b=>b.id!==eid);
  saveLocal();pushSheets();closeD();render();buildCats();toast(t('deleted'));
}
function urlToName(url){try{return new URL(url).pathname.split('/').filter(Boolean).pop().replace(/-/g,' ').slice(0,40)||'Item';}catch{return'Item';}}

// ── RENDER ──
function render(){
  const q=document.getElementById('srchInp').value.trim().toLowerCase();
  const list=bags.filter(b=>{
    const catM=(b.cat||'bags')===curCat;
    const qM=!q||(b.name||'').toLowerCase().includes(q)||(b.colors||'').toLowerCase().includes(q)||(b.url||'').toLowerCase().includes(q);
    return catM&&qM&&histOk(b);
  });
  document.getElementById('sbCount').textContent=bags.filter(b=>b.cat===curCat).length+' '+t('items');
  const g=document.getElementById('gallery');
  if(!list.length){
    const ico=CATS.find(c=>c.id===curCat)?.ico||'🛍️';
    g.innerHTML=`<div class="empty"><div class="ei">${ico}</div><p>${bags.filter(b=>b.cat===curCat).length?t('nores'):t('empty')}</p></div>`;return;
  }
  // mark dups
  const urlC={};list.forEach(b=>{urlC[b.url]=(urlC[b.url]||0)+1;});
  const dc={available:'sa',unavailable:'su',unknown:'sk'};
  g.innerHTML=list.map((b,i)=>{
    const imgHtml=b.img?`<img src="${b.img}" loading="lazy" onerror="this.style.display='none'" alt="">`:`<span>${CATS.find(c=>c.id===b.cat)?.ico||'👜'}</span>`;
    const pt=b.price?`<div class="price-tag">${b.price}</div>`:'';
    const db=urlC[b.url]>1?`<div class="dup-badge">!</div>`:'';
    const carr=(b.colors||'').split(',').map(c=>c.trim()).filter(Boolean);
    const cd=carr.length?`<div class="cdots">${carr.slice(0,8).map(c=>`<div class="cdot-c" style="background:${cHex(c)}"></div>`).join('')}</div>`:'';
    const nm=b.name?`<div class="card-name">${b.name}</div>`:'';
    const su=(b.url||'').replace(/'/g,"&#39;");
    const si=(b.img||'').replace(/'/g,"&#39;");
    return`<div class="card" style="animation-delay:${i*.025}s">
      <div class="card-thumb" onclick="openLB('${si}')">${imgHtml}<div class="sdot ${dc[b.status]||'sk'}"></div>${pt}${db}</div>
      ${nm}${cd}
      <div class="card-acts">
        <button class="ca ca-open" onclick="window.open('${su}','_blank')"><span class="ci">🔗</span>${t('open')}</button>
        <button class="ca" onclick="copyURL('${su}')"><span class="ci">📋</span>${t('copy_txt')}</button>
        <button class="ca" onclick="openEditP('${b.id}')"><span class="ci">✏️</span>${t('edit')}</button>
      </div>
    </div>`;
  }).join('');
}

// ── LIGHTBOX ──
function openLB(img){if(!img)return;document.getElementById('lbImg').src=img;document.getElementById('lb').classList.add('open');}
function closeLB(){document.getElementById('lb').classList.remove('open');}

// ── COPY ──
function copyURL(url){
  navigator.clipboard?.writeText(url).catch(()=>{const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();});
  toast(t('copied'));playClick(880,.06);
}

// ── EDIT ──
function openEditP(id){
  const b=bags.find(x=>x.id===id);if(!b)return;
  document.getElementById('eid2').value=b.id;
  document.getElementById('e-url').value=b.url||'';
  document.getElementById('e-img').value=b.img||'';
  document.getElementById('e-name').value=b.name||'';
  document.getElementById('e-price').value=b.price||'';
  document.getElementById('e-colors').value=b.colors||'';
  document.getElementById('e-note').value=b.note||'';
  document.getElementById('editTitle').textContent=t('edit_t');
  showPanel('pEdit');
}

// ── DETAIL ──
function openDetail(id){
  curBagId=id;const b=bags.find(x=>x.id===id);if(!b)return;
  const ico=CATS.find(c=>c.id===b.cat)?.ico||'👜';
  document.getElementById('detImgWrap').innerHTML=b.img?`<img class="det-img" src="${b.img}" onclick="openLB('${b.img.replace(/'/g,"&#39;")}')" onerror="this.outerHTML='<div class=det-img-ph>${ico}</div>'" alt="">`:`<div class="det-img-ph">${ico}</div>`;
  document.getElementById('detName').textContent=b.name||'';
  const pEl=document.getElementById('detPrice');pEl.textContent=b.price?'💲 '+b.price:'';pEl.style.display=b.price?'block':'none';
  const sl={available:'✅ '+t('open'),unavailable:'❌',unknown:'❓'};
  const sc={available:'ds-a',unavailable:'ds-u',unknown:'ds-k'};
  document.getElementById('detStatus').className='det-status '+(sc[b.status]||'ds-k');
  document.getElementById('detStatus').textContent='';
  const carr=(b.colors||'').split(',').map(c=>c.trim()).filter(Boolean);
  document.getElementById('detColors').innerHTML=carr.map(c=>`<div class="det-sw"><div class="det-sd" style="background:${cHex(c)}"></div>${c}</div>`).join('');
  const nEl=document.getElementById('detNote');nEl.style.display=b.note?'block':'none';if(b.note)nEl.textContent='📝 '+b.note;
  document.getElementById('detTitle').textContent=t('detail_t');
  showPanel('pDetail');
}
function detOpen(){const b=bags.find(x=>x.id===curBagId);if(b?.url)window.open(b.url,'_blank');}
async function detDel(){if(!confirm(t('del')+'?'))return;bags=bags.filter(b=>b.id!==curBagId);saveLocal();pushSheets();closeD();render();buildCats();toast(t('deleted'));}
function detEdit(){openEditP(curBagId);}

// ── PANELS ──
const PANELS=['pAdd','pEdit','pDetail'];
function showPanel(id){PANELS.forEach(p=>document.getElementById(p).style.display=p===id?'block':'none');document.getElementById('ov').classList.add('open');}
function openAdd(){
  document.getElementById('urlInp').value='';document.getElementById('imgInp').value='';document.getElementById('nameInp').value='';document.getElementById('editId').value='';
  document.getElementById('saveBtn').disabled=true;document.getElementById('saveBtn').classList.remove('done');
  document.getElementById('saveTxt').textContent=t('save');document.getElementById('saveCheck').classList.remove('show');document.getElementById('saveSpin').classList.remove('show');
  clearImg();showSpin(false);showRetry(false);document.getElementById('imgPH').style.display='flex';
  document.getElementById('imgManualWrap').style.display='none';manualOpen=false;
  document.getElementById('addTitle').textContent=t('add_t');lastUrl='';curImg='';
  populateCatSelect();saving=false;
  showPanel('pAdd');
  setTimeout(()=>document.getElementById('urlInp').focus(),380);
  playClick();
}
function closeD(){document.getElementById('ov').classList.remove('open');PANELS.forEach(p=>document.getElementById(p).style.display='none');}
function bgClose(e){if(e.target.id==='ov')closeD();}

// ── TOAST ──
let _t;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),2600);}

// ── PREFS ──
function loadPrefs(){
  const d=localStorage.getItem('tg_dark'),l=localStorage.getItem('tg_lang')||'ar',cc=localStorage.getItem('tg_cat')||'bags';
  if(d==='1'){dark=true;document.documentElement.setAttribute('data-theme','dark');document.getElementById('thmTr').classList.add('on');document.getElementById('hThBtn').textContent='☀️';}
  curCat=cc;setLang(l);
}

// ── PWA ──
if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});

// ── INIT ──
window.addEventListener('load',()=>{
  loadLocal();dedup();saveLocal();greeting();buildCats();render();
  syncSheets().finally(()=>{
    setTimeout(()=>document.getElementById('splash').classList.add('hide'),250);
    setTimeout(()=>document.getElementById('splash').remove(),850);
  });
  // save last-used cat
  setInterval(()=>localStorage.setItem('tg_cat',curCat),3000);
});
</script>
