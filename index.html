<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>حقائبي</title>
<meta name="theme-color" content="#1a1410">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="حقائبي">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f2ed;--card:#fff;--deep:#1a1410;--gold:#c8962e;--gold-l:#f0c96a;--text:#2a1f14;--text2:#8a7060;--border:#e0d8ce;--green:#2d7a4f;--red:#b53a2f;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Tajawal',sans-serif;background:var(--bg);min-height:100vh;}
#splash{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s,transform .5s;}
#splash.hide{opacity:0;transform:scale(1.05);pointer-events:none;}
.sp-icon{width:88px;height:88px;background:var(--gold);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:16px;animation:spop .7s cubic-bezier(.34,1.56,.64,1);}
@keyframes spop{from{transform:scale(.4);opacity:0;}to{transform:scale(1);opacity:1;}}
.sp-title{color:#fff;font-size:24px;font-weight:900;margin-bottom:4px;}
.sp-sub{color:rgba(255,255,255,.4);font-size:13px;}
.sp-ring{width:32px;height:32px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-top:22px;}
@keyframes spin{to{transform:rotate(360deg);}}
.hdr{background:var(--deep);padding:14px 16px 12px;position:sticky;top:0;z-index:50;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{display:flex;align-items:center;gap:8px;}
.logo-icon{width:32px;height:32px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{color:#fff;font-weight:900;font-size:16px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hcount{background:rgba(255,255,255,.1);border-radius:16px;padding:4px 12px;color:var(--gold-l);font-size:13px;font-weight:700;}
.sync-btn{background:rgba(255,255,255,.08);border:none;border-radius:16px;padding:5px 11px;color:rgba(255,255,255,.6);font-size:12px;font-family:'Tajawal',sans-serif;cursor:pointer;}
.sync-btn.spin{animation:spin .7s linear infinite;}
.srch{position:relative;}
.srch input{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:10px 40px 10px 14px;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;outline:none;}
.srch input::placeholder{color:rgba(255,255,255,.3);}
.srch input:focus{background:rgba(255,255,255,.15);border-color:var(--gold);}
.srch-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;}
.fbar{display:flex;gap:8px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none;}
.fbar::-webkit-scrollbar{display:none;}
.fp{background:var(--card);border:1.5px solid var(--border);border-radius:22px;padding:6px 14px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s;}
.fp.active{background:var(--deep);border-color:var(--deep);color:#fff;}
.gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px 10px 100px;}
.card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 6px rgba(106,76,42,.06);animation:pop .25s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes pop{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
.card-thumb{width:100%;aspect-ratio:1;background:#ede8e0;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;overflow:hidden;cursor:pointer;}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.sdot{position:absolute;top:7px;right:7px;width:10px;height:10px;border-radius:50%;border:2px solid #fff;}
.sa{background:var(--green);}.su{background:var(--red);}.sk{background:var(--gold);}
.price-tag{position:absolute;bottom:7px;left:7px;background:rgba(26,20,16,.78);color:#fff;border-radius:7px;padding:2px 7px;font-size:11px;font-weight:700;}
.card-foot{padding:7px 8px 9px;}
.card-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.cdots{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;}
.cdot-c{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(0,0,0,.12);flex-shrink:0;}
.open-btn{width:100%;background:var(--deep);color:#fff;border:none;border-radius:9px;padding:8px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.open-btn:active{opacity:.8;}
.empty{text-align:center;padding:60px 20px;grid-column:1/-1;}
.empty .ei{font-size:48px;margin-bottom:10px;}
.empty p{color:var(--text2);font-size:14px;}
.fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--deep);color:#fff;border:none;border-radius:28px;padding:13px 26px;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px;cursor:pointer;box-shadow:0 6px 20px rgba(26,20,16,.4);z-index:40;}
.fab:active{transform:translateX(-50%) scale(.95);}
.fab-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;}
.ov{position:fixed;inset:0;background:rgba(26,20,16,.65);backdrop-filter:blur(6px);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:22px 22px 0 0;padding:0 0 32px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);z-index:101;}
.ov.open .drawer{transform:translateY(0);}
.dhandle{width:34px;height:4px;background:#e0d8ce;border-radius:2px;margin:12px auto 0;}
.dhead{padding:12px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.dtitle{font-size:16px;font-weight:900;color:var(--text);}
.dclose{width:30px;height:30px;background:var(--bg);border-radius:8px;border:none;cursor:pointer;font-size:15px;color:var(--text2);}
.dbody{padding:14px 18px;}
/* ADD FORM */
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:4px;}
.fg input,.fg textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:11px;padding:10px 13px;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border .2s;resize:none;}
.fg input:focus,.fg textarea:focus{border-color:var(--gold);background:#fff;}
.fg-row{display:flex;gap:9px;}.fg-row .fg{flex:1;}
/* IMAGE PREVIEW */
.img-section{margin-bottom:13px;}
.prev-wrap{width:100%;aspect-ratio:4/3;background:#ede8e0;border-radius:13px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);font-size:36px;position:relative;margin-bottom:8px;}
.prev-wrap img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.img-tip{background:#fdf8f0;border:1px solid rgba(200,150,46,.2);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--brown, #6b4c2a);line-height:1.6;}
.img-tip strong{color:var(--gold);display:block;margin-bottom:2px;}
.status-row{display:flex;gap:7px;margin-bottom:13px;}
.stbtn{flex:1;padding:9px 4px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;}
.act-a{background:rgba(45,122,79,.1);border-color:var(--green);color:var(--green);}
.act-u{background:rgba(181,58,47,.1);border-color:var(--red);color:var(--red);}
.act-k{background:rgba(200,150,46,.1);border-color:var(--gold);color:var(--gold);}
.btn-save{width:100%;background:var(--deep);color:#fff;border:none;border-radius:13px;padding:14px;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;cursor:pointer;}
.btn-save:disabled{opacity:.35;cursor:not-allowed;}
/* DETAIL */
.det-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:14px;margin-bottom:13px;display:block;}
.det-img-ph{width:100%;aspect-ratio:4/3;background:#ede8e0;border-radius:14px;margin-bottom:13px;display:flex;align-items:center;justify-content:center;font-size:44px;}
.det-name{font-size:17px;font-weight:900;margin-bottom:4px;}
.det-price{font-size:15px;color:var(--gold);font-weight:700;margin-bottom:7px;}
.det-status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:10px;}
.ds-a{background:rgba(45,122,79,.1);color:var(--green);}
.ds-u{background:rgba(181,58,47,.1);color:var(--red);}
.ds-k{background:rgba(200,150,46,.1);color:var(--gold);}
.det-colors{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.det-sw{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--border);border-radius:18px;padding:3px 9px;font-size:12px;}
.det-sd{width:13px;height:13px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}
.det-note{font-size:13px;color:var(--text2);background:var(--bg);border-radius:9px;padding:8px 10px;margin-bottom:14px;line-height:1.5;}
.det-btns{display:flex;gap:8px;}
.dbtn{flex:1;padding:12px 4px;border-radius:11px;border:none;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;text-align:center;}
.dbtn-open{background:var(--deep);color:#fff;}
.dbtn-edit{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
.dbtn-del{background:rgba(181,58,47,.08);color:var(--red);border:1.5px solid rgba(181,58,47,.2);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--deep);color:#fff;border-radius:28px;padding:9px 20px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;white-space:nowrap;z-index:200;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:540px){.gallery{grid-template-columns:repeat(3,1fr);}}
@media(min-width:800px){.gallery{grid-template-columns:repeat(4,1fr);}.drawer{max-width:480px;left:50%;right:auto;transform:translateX(-50%) translateY(100%);border-radius:22px;bottom:32px;}.ov.open .drawer{transform:translateX(-50%) translateY(0);}}
@media(min-width:1100px){.gallery{grid-template-columns:repeat(5,1fr);}}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-icon">👜</div>
  <div class="sp-title">حقائبي</div>
  <div class="sp-sub">متصل بـ Google Sheets</div>
  <div class="sp-ring"></div>
</div>

<div class="hdr">
  <div class="hdr-row">
    <div class="logo"><div class="logo-icon">👜</div><div class="logo-text">حقائبي</div></div>
    <div class="hdr-right">
      <div class="hcount" id="hcount">0</div>
      <button class="sync-btn" id="syncBtn" onclick="syncSheets()">🔄 تحديث</button>
    </div>
  </div>
  <div class="srch"><input type="text" id="srchInput" placeholder="ابحث..." oninput="render()"><span class="srch-ico">🔍</span></div>
</div>

<div class="fbar">
  <button class="fp active" onclick="setF('all',this)">الكل</button>
  <button class="fp" onclick="setF('available',this)">✅ متوفرة</button>
  <button class="fp" onclick="setF('unavailable',this)">❌ نفذت</button>
  <button class="fp" onclick="setF('unknown',this)">❓ غير معروف</button>
</div>

<div class="gallery" id="gallery"></div>
<button class="fab" onclick="openAdd()"><div class="fab-dot"></div>إضافة حقيبة</button>

<div class="ov" id="ov" onclick="bgClose(event)">
  <div class="drawer">
    <div class="dhandle"></div>

    <!-- ADD PANEL -->
    <div id="pAdd">
      <div class="dhead"><div class="dtitle" id="addTitle">إضافة حقيبة</div><button class="dclose" onclick="closeD()">✕</button></div>
      <div class="dbody">
        <div class="fg"><label>رابط المنتج ✱</label><input type="url" id="urlInp" placeholder="https://www.shulebags.com/..."></div>

        <!-- صورة -->
        <div class="img-section">
          <div class="prev-wrap" id="prevWrap"><span>👜</span></div>
          <div class="img-tip">
            <strong>📸 كيف تضيف الصورة؟</strong>
            افتح صفحة الحقيبة → اضغط مطولاً على الصورة → "نسخ رابط الصورة" → الصقه هنا
          </div>
          <div class="fg" style="margin-top:8px;margin-bottom:0">
            <input type="url" id="imgInp" placeholder="الصق رابط الصورة هنا...">
          </div>
        </div>

        <div class="fg"><label>اسم الحقيبة</label><input type="text" id="nameInp" placeholder="اسم الحقيبة"></div>
        <div class="fg-row">
          <div class="fg"><label>سعر الشراء</label><input type="text" id="priceInp" placeholder="850 TL"></div>
          <div class="fg"><label>الألوان</label><input type="text" id="colorsInp" placeholder="أحمر، أسود..."></div>
        </div>
        <div class="fg"><label>ملاحظات</label><textarea id="noteInp" rows="2" placeholder="أي تفاصيل..."></textarea></div>
        <div class="status-row">
          <button class="stbtn act-a" id="st-a" onclick="setSt('available')">✅ متوفرة</button>
          <button class="stbtn" id="st-u" onclick="setSt('unavailable')">❌ نفذت</button>
          <button class="stbtn" id="st-k" onclick="setSt('unknown')">❓ غير معروف</button>
        </div>
        <input type="hidden" id="editId">
        <button class="btn-save" id="saveBtn" onclick="saveBag()">💾 حفظ</button>
      </div>
    </div>

    <!-- DETAIL PANEL -->
    <div id="pDetail" style="display:none">
      <div class="dhead"><div class="dtitle">تفاصيل الحقيبة</div><button class="dclose" onclick="closeD()">✕</button></div>
      <div class="dbody">
        <div id="detImgWrap"></div>
        <div class="det-name" id="detName"></div>
        <div class="det-price" id="detPrice"></div>
        <div class="det-status" id="detStatus"></div>
        <div class="det-colors" id="detColors"></div>
        <div class="det-note" id="detNote" style="display:none"></div>
        <div class="det-btns">
          <button class="dbtn dbtn-open" onclick="detOpen()">🔗 فتح</button>
          <button class="dbtn dbtn-edit" onclick="detEdit()">✏️ تعديل</button>
          <button class="dbtn dbtn-del" onclick="detDelete()">🗑️ حذف</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GS = 'https://script.google.com/macros/s/AKfycbwAsRo6SpOYqMfcWxFbl2gqLLjbEYjVvecSIVAfO-IFrM0Gek4uc0vhhukZqwH71hI/exec';

const CM={'أسود':'#1a1a1a','أبيض':'#f5f5f5','أحمر':'#e53935','أزرق':'#1565c0','أخضر':'#2e7d32','أصفر':'#f9a825','وردي':'#e91e8c','بنفسجي':'#7b1fa2','برتقالي':'#e65100','رمادي':'#757575','بني':'#795548','بيج':'#d4b896','كريمي':'#f5f0e8','كحلي':'#1a237e','ذهبي':'#f0b429','فضي':'#9e9e9e','كاراميل':'#c4874e','خمري':'#880e4f','زيتي':'#558b2f','تركواز':'#00838f','بوردو':'#800020','bordo':'#800020','siyah':'#1a1a1a','beyaz':'#f5f5f5','kirmizi':'#e53935','mavi':'#1565c0','pembe':'#e91e8c','gri':'#757575','kahverengi':'#795548','bej':'#d4b896','lacivert':'#1a237e','black':'#1a1a1a','white':'#f5f5f5','red':'#e53935','blue':'#1565c0','green':'#2e7d32','pink':'#e91e8c','grey':'#757575','gray':'#757575','brown':'#795548','beige':'#d4b896','navy':'#1a237e','camel':'#c4874e','burgundy':'#800020'};
function cHex(n){if(!n)return'#bbb';const l=n.toLowerCase().trim();for(const[k,v]of Object.entries(CM)){if(l.includes(k))return v;}return'#bdbdbd';}

let bags=[],filt='all',curStatus='available',curBagId=null;
function loadLocal(){try{bags=JSON.parse(localStorage.getItem('haqaibi_gs2')||'[]');}catch(e){bags=[];}}
function saveLocal(){localStorage.setItem('haqaibi_gs2',JSON.stringify(bags));}

// Google Sheets sync
async function syncSheets(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='⏳';
  try{
    const r=await fetch(GS+'?t='+Date.now());
    const data=await r.json();
    if(Array.isArray(data)&&data.length>=0){
      bags=data.map(b=>({id:b.id||'',name:b.name||'',url:b.url||'',img:b.img||'',price:b.price||'',colors:b.colors||'',note:b.note||'',status:b.status||'available'}));
      saveLocal();render();
      toast('✅ '+bags.length+' حقيبة');
    }
  }catch(e){ toast('⚠️ تعذّر الاتصال'); }
  btn.textContent='🔄 تحديث';
}

async function pushSheets(){
  try{
    await fetch(GS,{method:'POST',body:JSON.stringify({action:'save',bags}),headers:{'Content-Type':'text/plain'}});
  }catch(e){}
}

// Image input listener
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('imgInp').addEventListener('input',function(){
    const u=this.value.trim();
    const w=document.getElementById('prevWrap');
    if(u){w.innerHTML=`<img src="${u}" onerror="this.outerHTML='<span>👜</span>'" alt="">`;}
    else{w.innerHTML='<span>👜</span>';}
  });
  document.getElementById('urlInp').addEventListener('input',function(){
    document.getElementById('saveBtn').disabled=!this.value.trim();
  });
  document.getElementById('saveBtn').disabled=true;
});

function setSt(s){
  curStatus=s;
  const m={available:'act-a',unavailable:'act-u',unknown:'act-k'};
  ['a','u','k'].forEach(x=>{const b=document.getElementById('st-'+x);b.className='stbtn';if((x==='a'&&s==='available')||(x==='u'&&s==='unavailable')||(x==='k'&&s==='unknown'))b.classList.add(m[s]);});
}

async function saveBag(){
  const url=document.getElementById('urlInp').value.trim();
  if(!url)return;
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.textContent='⏳ جاري...';
  const img=document.getElementById('imgInp').value.trim();
  const eid=document.getElementById('editId').value;
  const bag={
    id:eid||Date.now().toString(36)+Math.random().toString(36).slice(2,4),
    name:document.getElementById('nameInp').value.trim()||urlToName(url),
    url,img,
    price:document.getElementById('priceInp').value.trim(),
    colors:document.getElementById('colorsInp').value.trim(),
    note:document.getElementById('noteInp').value.trim(),
    status:curStatus
  };
  if(eid){const i=bags.findIndex(b=>b.id===eid);if(i>=0)bags[i]=bag;else bags.unshift(bag);}
  else bags.unshift(bag);
  saveLocal();
  await pushSheets();
  toast('✅ تم الحفظ');
  btn.disabled=false;btn.textContent='💾 حفظ';
  closeD();render();
}

function urlToName(url){try{return new URL(url).pathname.split('/').filter(Boolean).pop().replace(/-/g,' ').slice(0,40)||'حقيبة';}catch(e){return'حقيبة';}}

function setF(f,el){filt=f;document.querySelectorAll('.fp').forEach(p=>p.classList.remove('active'));el.classList.add('active');render();}
function render(){
  const q=document.getElementById('srchInput').value.trim().toLowerCase();
  const list=bags.filter(b=>(!q||b.name.toLowerCase().includes(q)||(b.colors||'').toLowerCase().includes(q))&&(filt==='all'||b.status===filt));
  document.getElementById('hcount').textContent=bags.length;
  const g=document.getElementById('gallery');
  if(!list.length){g.innerHTML=`<div class="empty"><div class="ei">${bags.length?'🔍':'🛍️'}</div><p>${bags.length?'لا توجد نتائج':'أضف أول حقيبة!'}</p></div>`;return;}
  const dc={available:'sa',unavailable:'su',unknown:'sk'};
  g.innerHTML=list.map((b,i)=>{
    const thumb=b.img?`<img src="${b.img}" loading="lazy" onerror="this.style.display='none'" alt="">`:'<span>👜</span>';
    const pt=b.price?`<div class="price-tag">${b.price}</div>`:'';
    const carr=(b.colors||'').split(',').map(c=>c.trim()).filter(Boolean);
    const cd=carr.length?`<div class="cdots">${carr.slice(0,8).map(c=>`<div class="cdot-c" style="background:${cHex(c)}" title="${c}"></div>`).join('')}</div>`:'';
    const su=(b.url||'').replace(/'/g,"&#39;");
    return `<div class="card" style="animation-delay:${i*.03}s">
      <div class="card-thumb" onclick="openDetail('${b.id}')">${thumb}<div class="sdot ${dc[b.status]||'sk'}"></div>${pt}</div>
      <div class="card-foot"><div class="card-name">${b.name}</div>${cd}
        <button class="open-btn" onclick="event.stopPropagation();window.open('${su}','_blank')">🔗 فتح الموقع</button>
      </div></div>`;
  }).join('');
}

function openDetail(id){
  curBagId=id;const b=bags.find(x=>x.id===id);if(!b)return;
  document.getElementById('detImgWrap').innerHTML=b.img?`<img class="det-img" src="${b.img}" onerror="this.outerHTML='<div class=det-img-ph>👜</div>'" alt="">`:`<div class="det-img-ph">👜</div>`;
  document.getElementById('detName').textContent=b.name||'حقيبة';
  const pEl=document.getElementById('detPrice');pEl.textContent=b.price?'💲 '+b.price:'';pEl.style.display=b.price?'block':'none';
  const sl={available:'✅ متوفرة',unavailable:'❌ نفذت',unknown:'❓ غير معروف'};
  const sc={available:'ds-a',unavailable:'ds-u',unknown:'ds-k'};
  document.getElementById('detStatus').textContent=sl[b.status]||'❓';
  document.getElementById('detStatus').className='det-status '+(sc[b.status]||'ds-k');
  const carr=(b.colors||'').split(',').map(c=>c.trim()).filter(Boolean);
  document.getElementById('detColors').innerHTML=carr.map(c=>`<div class="det-sw"><div class="det-sd" style="background:${cHex(c)}"></div>${c}</div>`).join('');
  const nEl=document.getElementById('detNote');
  if(b.note){nEl.textContent='📝 '+b.note;nEl.style.display='block';}else nEl.style.display='none';
  document.getElementById('pAdd').style.display='none';
  document.getElementById('pDetail').style.display='block';
  document.getElementById('ov').classList.add('open');
}
function detOpen(){const b=bags.find(x=>x.id===curBagId);if(b?.url)window.open(b.url,'_blank');}
async function detDelete(){
  if(!confirm('حذف هذه الحقيبة؟'))return;
  bags=bags.filter(b=>b.id!==curBagId);
  saveLocal();await pushSheets();closeD();render();toast('🗑️ تم الحذف');
}
function detEdit(){
  const b=bags.find(x=>x.id===curBagId);if(!b)return;
  document.getElementById('pDetail').style.display='none';
  document.getElementById('pAdd').style.display='block';
  document.getElementById('addTitle').textContent='تعديل الحقيبة';
  document.getElementById('editId').value=b.id;
  document.getElementById('urlInp').value=b.url||'';
  document.getElementById('imgInp').value=b.img||'';
  document.getElementById('nameInp').value=b.name||'';
  document.getElementById('priceInp').value=b.price||'';
  document.getElementById('colorsInp').value=b.colors||'';
  document.getElementById('noteInp').value=b.note||'';
  setSt(b.status||'available');
  document.getElementById('saveBtn').disabled=false;
  document.getElementById('saveBtn').textContent='💾 حفظ';
  const w=document.getElementById('prevWrap');
  w.innerHTML=b.img?`<img src="${b.img}" onerror="this.outerHTML='<span>👜</span>'" alt="">`:'<span>👜</span>';
}

function openAdd(){
  document.getElementById('pAdd').style.display='block';
  document.getElementById('pDetail').style.display='none';
  document.getElementById('addTitle').textContent='إضافة حقيبة';
  document.getElementById('editId').value='';
  ['urlInp','imgInp','nameInp','priceInp','colorsInp','noteInp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('prevWrap').innerHTML='<span>👜</span>';
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('saveBtn').textContent='💾 حفظ';
  setSt('available');
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('urlInp').focus(),380);
}
function closeD(){document.getElementById('ov').classList.remove('open');document.getElementById('pAdd').style.display='block';document.getElementById('pDetail').style.display='none';}
function bgClose(e){if(e.target.id==='ov')closeD();}

let _t;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),2600);}

if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});

window.addEventListener('load',()=>{
  loadLocal();render();
  syncSheets().finally(()=>{
    setTimeout(()=>document.getElementById('splash').classList.add('hide'),100);
    setTimeout(()=>document.getElementById('splash').remove(),700);
  });
});
</script>
</body>
</html>
