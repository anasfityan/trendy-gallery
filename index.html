<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تجربة الربط</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
    <h2>اختبار الاتصال بالسحابة</h2>
    <input type="text" id="testInp" placeholder="اكتب أي شيء هنا">
    <button onclick="testSave()">اضغط للحفظ وتجربة المزامنة</button>
    <div id="status"></div>
    <ul id="list"></ul>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDae0M8CdKmahKD78YICAON5VC01aG43cM",
  authDomain: "haqaibi-50ba4.firebaseapp.com",
  databaseURL: "https://haqaibi-50ba4-default-rtdb.firebaseio.com/",
  projectId: "haqaibi-50ba4",
  storageBucket: "haqaibi-50ba4.firebasestorage.app",
  messagingSenderId: "461111216258",
  appId: "1:461111216258:web:694ad5d112f60a01274c9b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function testSave() {
    const val = document.getElementById('testInp').value;
    db.ref('test_logs').push({ text: val, time: Date.now() })
    .then(() => alert("✅ تم الحفظ بنجاح! المزامنة تعمل"))
    .catch((error) => alert("❌ فشل الحفظ: " + error.message));
}

// عرض البيانات مباشرة
db.ref('test_logs').on('value', (snap) => {
    const data = snap.val();
    const list = document.getElementById('list');
    list.innerHTML = '';
    for(let id in data) {
        list.innerHTML += `<li>${data[id].text}</li>`;
    }
});
</script>
</body>
</html>
